spring:
  application:
    name: feiapi-backend
  # DataSource Config
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${FEIAPI_DB_HOST:localhost}:${FEIAPI_DB_PORT:3306}/${FEIAPI_DB_NAME:feiapi}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${FEIAPI_DB_USERNAME:root}
    password: ${FEIAPI_DB_PASSWORD:}
  mvc:
    pathmatch:
      matching-strategy: ANT_PATH_MATCHER
  # session 失效时间（分钟）
  session:
    timeout: 86400
    store-type: redis
  # redis 配置
  redis:
    host: ${FEIAPI_REDIS_HOST:localhost}
    port: ${FEIAPI_REDIS_PORT:6379}
    database: ${FEIAPI_REDIS_DATABASE:0}
    password: ${FEIAPI_REDIS_PASSWORD:}

server:
  port: 9527
  servlet:
    context-path: /api

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: isDelete # 全局逻辑删除的实体字段名(since 3.3.0,配置后可以忽略不配置步骤2)
      logic-delete-value: 1 # 逻辑已删除值(默认为 1)
      logic-not-delete-value: 0 # 逻辑未删除值(默认为 0)


#自定义接口调用客户端
feiapi:
  clint:
    access-key: ${FEIAPI_CLIENT_ACCESS_KEY:}
    secret-key: ${FEIAPI_CLIENT_SECRET_KEY:}
    gateway-host: ${FEIAPI_CLIENT_GATEWAY_HOST:http://localhost:8090}

dubbo:
  application:
    name: feiapi-backend
#  protocol:
#    name: dubbo
#    port: -1
  registry:
#    id: zk-registry
    address: nacos://${FEIAPI_NACOS_HOST:localhost}:${FEIAPI_NACOS_PORT:8848}
  #配置超时时间
  consumer:
    timeout: 5000
  provider:
    timeout: 10000

  service:
    shutdown:
      wait: 30000
